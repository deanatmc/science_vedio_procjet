<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>理化雲端導航 | 完整課程</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: #f8fafc; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: white; border: 1px solid #e2e8f0; border-radius: 16px; transition: all 0.2s; }
        .completed { background: #f0fdf4 !important; border-color: #bbf7d0 !important; }
        .completed h3 { color: #166534; text-decoration: line-through; opacity: 0.6; }
        .custom-checkbox { width: 22px; height: 22px; border-radius: 6px; border: 2px solid #cbd5e1; appearance: none; display: flex; align-items: center; justify-content: center; background: white; flex-shrink: 0; }
        .custom-checkbox:checked { background: #22c55e; border-color: #22c55e; }
        .custom-checkbox:checked::after { content: "\f00c"; font-family: "Font Awesome 6 Free"; font-weight: 900; color: white; font-size: 12px; }
        .tab-active { color: #0284c7; border-bottom: 3px solid #0284c7; }
        @keyframes pulse-sync { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .syncing { animation: pulse-sync 1.2s infinite; }
    </style>
</head>
<body class="pb-20">
    <!-- 登入驗證 -->
    <div id="authGuard" class="fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center px-6">
        <div class="w-full max-w-sm bg-white p-8 rounded-[2rem] shadow-2xl text-center">
            <div class="w-16 h-16 bg-sky-500 text-white rounded-2xl flex items-center justify-center text-2xl mx-auto mb-6 shadow-lg shadow-sky-200">
                <i class="fas fa-user-graduate"></i>
            </div>
            <h2 class="text-xl font-black mb-1 text-slate-800">理化雲端導航</h2>
            <p class="text-slate-400 text-sm mb-8">請輸入學習密碼</p>
            <input type="password" id="pwInput" placeholder="密碼：study" class="w-full p-4 rounded-xl bg-slate-100 border-none text-center text-xl mb-4 outline-sky-500">
            <button onclick="checkPw()" class="w-full py-4 bg-sky-600 text-white rounded-xl font-bold active:scale-95 transition-all">登入學習系統</button>
        </div>
    </div>

    <div id="app" class="hidden">
        <header class="sticky top-0 bg-white/90 backdrop-blur-md border-b z-40 px-6 pt-6 pb-2">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h1 class="text-xl font-black text-slate-800 tracking-tight">學習進度同步</h1>
                    <div class="flex items-center gap-2 mt-1">
                        <div id="syncDot" class="w-2.5 h-2.5 rounded-full bg-slate-300"></div>
                        <span id="syncText" class="text-xs font-bold text-slate-400 uppercase">準備中...</span>
                    </div>
                </div>
                <div id="uIDDisplay" class="text-[10px] font-mono bg-slate-100 px-2 py-1 rounded text-slate-500 border border-slate-200">ID: ----</div>
            </div>
            <div class="flex gap-8">
                <button onclick="switchTab('陳詮')" id="tab-陳詮" class="pb-3 text-sm font-black tab-active transition-all">陳詮老師</button>
                <button onclick="switchTab('劉川楓')" id="tab-劉川楓" class="pb-3 text-sm font-bold text-slate-400 transition-all">劉川楓老師</button>
            </div>
        </header>

        <main class="p-5">
            <div id="list" class="space-y-3">
                <!-- 課程清單將由此處生成 -->
            </div>
        </main>
    </div>

    <script>
        const SB_URL = 'https://piovrdifroesqwozwtnm.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpb3ZyZGlmcm9lc3F3b3p3dG5tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1OTE3NTgsImV4cCI6MjA5MjE2Nzc1OH0.7lmWsr8gd99rNXoZNdSuoVffiny-Z5Zt7jEhZPRXGf8';
        
        let currentTeacher = '陳詮';
        let progress = JSON.parse(localStorage.getItem('sci_v5_data') || '{}');
        let userId = localStorage.getItem('sci_v5_id') || `STU${Math.floor(Math.random()*9000)+1000}`;
        let supabaseClient;

        // 完整課程資料
        const courses = [
            // 陳詮老師
            { teacher: "陳詮", cat: "B4-C1", title: "化學反應的特徵 (含例題)", url: "https://youtu.be/toMOr4DSKA" },
            { teacher: "陳詮", cat: "B4-C1", title: "質量守恆定律", url: "https://youtu.be/QjzEYB8QIPM" },
            { teacher: "陳詮", cat: "B4-C1", title: "化學反應表示法及係數平衡", url: "https://youtu.be/98xtXVtJzKM" },
            { teacher: "陳詮", cat: "B4-C1", title: "原子量與莫耳數", url: "https://youtu.be/DbERFgkt7X4" },
            { teacher: "陳詮", cat: "B4-C2", title: "元素的燃燒與活性", url: "https://youtu.be/SobXMJ7UofU" },
            { teacher: "陳詮", cat: "B4-C2", title: "氧化還原觀念", url: "https://youtu.be/taV_wdGLZ90" },
            { teacher: "陳詮", cat: "B4-C3", title: "電解質觀念", url: "https://youtu.be/rdEXI1sTZOA" },
            { teacher: "陳詮", cat: "B4-C3", title: "酸鹼鹽觀念大集合", url: "https://youtu.be/Gpq_CTIMegE" },
            { teacher: "陳詮", cat: "B4-C4", title: "有機化合物定義與檢測", url: "https://youtu.be/Z9piArlF2vk" },
            { teacher: "陳詮", cat: "B4-C5", title: "有機聚合物", url: "https://youtu.be/RB2R-panIUo" },
            { teacher: "陳詮", cat: "B4-C6", title: "力的基本性質", url: "https://youtu.be/PTXijsBihNg" },
            { teacher: "陳詮", cat: "B4-C6", title: "大氣壓力觀念", url: "https://youtu.be/EEkbL8QZhdc" },
            { teacher: "陳詮", cat: "B4-C6", title: "浮體與沉體關係式", url: "https://youtu.be/FV33NgTMpcE" },
            
            // 劉川楓老師
            { teacher: "劉川楓", cat: "B3-C1", title: "1-1 實驗安全與設計", url: "https://youtu.be/kQn2Nm0hrCM" },
            { teacher: "劉川楓", cat: "B3-C1", title: "1-2 長度與體積的測量", url: "https://youtu.be/8_2rn5JM3g4" },
            { teacher: "劉川楓", cat: "B3-C1", title: "1-4 物質的密度", url: "https://youtu.be/4IX46s7JFk1" },
            { teacher: "劉川楓", cat: "B3-C2", title: "2-2 水溶液及濃度", url: "https://youtu.be/CKNPX091-91" },
            { teacher: "劉川楓", cat: "B3-C3", title: "3-1 波的傳播", url: "https://youtu.be/JAxyGBJsLgk" },
            { teacher: "劉川楓", cat: "B3-C4", title: "4-1 光的直進", url: "https://youtu.be/jvIys5anwVE" },
            { teacher: "劉川楓", cat: "B3-C5", title: "5-2 熱量與比熱", url: "https://youtu.be/Nb9n2PExZQk" },
            { teacher: "劉川楓", cat: "B3-C6", title: "6-6 物質變化的粒子觀點", url: "https://youtu.be/1lkLfobZxS8" },
            { teacher: "劉川楓", cat: "B4-C1", title: "1-2 原子量與莫耳數", url: "https://youtu.be/JmRan81w-Jg" },
            { teacher: "劉川楓", cat: "B4-C2", title: "2-2 氧化還原與其應用", url: "https://youtu.be/6DHT4mo3L88" },
            { teacher: "劉川楓", cat: "B4-C6", title: "6-6 水的浮力", url: "https://youtu.be/hYVHIuiphG4" }
        ];

        function checkPw() {
            if(document.getElementById('pwInput').value === 'study') {
                document.getElementById('authGuard').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                initApp();
            } else {
                alert('密碼有誤，請再試一次');
            }
        }

        async function initApp() {
            try {
                supabaseClient = supabase.createClient(SB_URL, SB_KEY);
                localStorage.setItem('sci_v5_id', userId);
                document.getElementById('uIDDisplay').innerText = `ID: ${userId}`;
                
                setStatus("雲端同步中", "bg-sky-400", true);
                
                // 從資料表抓取資料
                const { data, error } = await supabaseClient
                    .from('science_tracker')
                    .select('data')
                    .eq('user_id', userId)
                    .maybeSingle();
                
                if (data && data.data) {
                    progress = data.data;
                    localStorage.setItem('sci_v5_data', JSON.stringify(progress));
                    setStatus("已同步最新進度", "bg-green-500");
                } else {
                    setStatus("本地模式 (新用戶)", "bg-green-500");
                }
                render();
            } catch (err) {
                console.error(err);
                setStatus("同步失敗", "bg-red-500");
                render();
            }
        }

        async function syncCloud() {
            if (!supabaseClient) return;
            setStatus("儲存至雲端...", "bg-sky-400", true);
            
            // 使用簡單的 upsert，僅包含 user_id 和 data 欄位
            const { error } = await supabaseClient
                .from('science_tracker')
                .upsert({ user_id: userId, data: progress }, { onConflict: 'user_id' });

            if (error) {
                console.error("Cloud Sync Error:", error);
                setStatus("雲端儲存失敗", "bg-red-500");
            } else {
                setStatus("已安全儲存", "bg-green-500");
            }
        }

        function setStatus(text, color, isSyncing = false) {
            const dot = document.getElementById('syncDot');
            const label = document.getElementById('syncText');
            dot.className = `w-2.5 h-2.5 rounded-full ${color} ${isSyncing ? 'syncing' : ''}`;
            label.innerText = text;
        }

        function render() {
            const listContainer = document.getElementById('list');
            listContainer.innerHTML = '';

            const filtered = courses.filter(c => c.teacher === currentTeacher);

            filtered.forEach(item => {
                const isDone = progress[item.url] === true;
                const card = document.createElement('div');
                card.className = `glass-card p-5 flex items-center gap-4 ${isDone ? 'completed' : 'shadow-sm'}`;
                
                card.innerHTML = `
                    <input type="checkbox" class="custom-checkbox" ${isDone ? 'checked' : ''}>
                    <div class="flex-1 min-w-0">
                        <div class="text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-wider">${item.cat}</div>
                        <h3 class="font-bold text-slate-800 text-sm md:text-base leading-tight">${item.title}</h3>
                    </div>
                    <a href="${item.url}" target="_blank" onclick="event.stopPropagation()" class="flex-shrink-0 w-10 h-10 rounded-full bg-red-50 flex items-center justify-center text-red-600 hover:bg-red-100 transition-colors">
                        <i class="fab fa-youtube"></i>
                    </a>
                `;

                card.onclick = () => {
                    if (progress[item.url]) {
                        delete progress[item.url];
                    } else {
                        progress[item.url] = true;
                        confetti({ particleCount: 20, spread: 40, origin: { y: 0.9 }, colors: ['#22c55e'] });
                    }
                    localStorage.setItem('sci_v5_data', JSON.stringify(progress));
                    render();
                    syncCloud();
                };

                listContainer.appendChild(card);
            });
        }

        function switchTab(t) {
            currentTeacher = t;
            document.getElementById('tab-陳詮').className = t === '陳詮' ? 'pb-3 text-sm font-black tab-active' : 'pb-3 text-sm font-bold text-slate-400';
            document.getElementById('tab-劉川楓').className = t === '劉川楓' ? 'pb-3 text-sm font-black tab-active' : 'pb-3 text-sm font-bold text-slate-400';
            render();
        }
    </script>
</body>
</html>
