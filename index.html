        function checkPw() {
            if(document.getElementById('pwInput').value.trim() === ACCESS_PW) {
                document.getElementById('authGuard').classList.add('opacity-0');
                setTimeout(() => {
                    document.getElementById('authGuard').remove();
                    document.getElementById('app').classList.remove('hidden');
                    loadCloudData();
                    render();
                }, 400);
            } else {
                const btn = document.querySelector('button');
                btn.innerText = "密碼錯誤！";
                btn.classList.add('bg-red-500');
                setTimeout(() => {
                    btn.innerText = "開啟學習導航";
                    btn.classList.remove('bg-red-500');
                }, 2000);
            }
        }

        async function loadCloudData() {
            const ind = document.getElementById('syncIndicator');
            const txt = document.getElementById('syncText');
            try {
                ind.classList.add('syncing');
                const { data, error } = await client.from('science_tracker').select('data').eq('user_id', userId).maybeSingle();
                if (error) throw error;
                if (data && data.data) {
                    progress = data.data;
                    localStorage.setItem('sci_progress_v2', JSON.stringify(progress));
                    render();
                }
                ind.className = "w-2 h-2 rounded-full bg-green-500";
                txt.innerText = "雲端同步中";
            } catch(e) {
                ind.className = "w-2 h-2 rounded-full bg-amber-500";
                txt.innerText = "本地模式";
            } finally {
                ind.classList.remove('syncing');
            }
        }

        async function toggleDone(url) {
            const ind = document.getElementById('syncIndicator');
            const txt = document.getElementById('syncText');
            
            if (progress[url]) delete progress[url];
            else {
                progress[url] = true;
                confetti({ particleCount: 30, spread: 50, origin: { y: 0.8 }, colors: ['#0284c7'] });
            }
            localStorage.setItem('sci_progress_v2', JSON.stringify(progress));
            render();

            try {
                ind.classList.add('syncing');
                await client.from('science_tracker').upsert({ user_id: userId, data: progress }, { onConflict: 'user_id' });
                ind.className = "w-2 h-2 rounded-full bg-green-500";
                txt.innerText = "已存至雲端";
            } catch(e) {
                ind.className = "w-2 h-2 rounded-full bg-red-500";
                txt.innerText = "同步失敗";
            } finally {
                ind.classList.remove('syncing');
            }
        }

        function render() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const container = document.getElementById('contentList');
            container.innerHTML = "";

            ["陳詮", "劉川楓"].forEach(t => {
                const filtered = courses.filter(c => 
                    c.teacher === t && 
                    (c.title.toLowerCase().includes(query) || c.cat.toLowerCase().includes(query))
                );
                
                if(filtered.length === 0 && query !== "") return;

                const tSection = document.createElement('div');
                tSection.id = `sec-${t}`;
                tSection.innerHTML = `
                    <div class="flex justify-between items-end mb-5">
                        <h2 class="text-2xl font-black flex items-center gap-3">
                            <span class="w-1.5 h-8 ${t === '陳詮' ? 'bg-sky-500' : 'bg-amber-500'} rounded-full"></span>
                            ${t} 老師
                        </h2>
                        <span class="text-[10px] font-bold text-slate-400 bg-slate-100 px-3 py-1 rounded-full">${filtered.length} 部影片</span>
                    </div>
                `;
                
                const grid = document.createElement('div');
                grid.className = "grid grid-cols-1 gap-4";
                
                filtered.forEach(c => {
                    const isDone = progress[c.url];
                    const card = document.createElement('div');
                    card.className = `video-card glass-card p-5 flex items-center gap-4 ${isDone ? 'completed shadow-none border-green-100' : 'shadow-sm'}`;
                    card.onclick = () => toggleDone(c.url);
                    card.innerHTML = `
                        <input type="checkbox" class="custom-checkbox" ${isDone ? 'checked' : ''} onclick="event.stopPropagation()">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="badge ${isDone ? 'bg-green-100 text-green-600' : 'bg-sky-50 text-sky-500'}">${c.type}</span>
                                <span class="text-[10px] font-black text-slate-300 tracking-tighter">${c.cat}</span>
                            </div>
                            <h3 class="title-text font-bold text-slate-700 text-sm truncate">${c.title}</h3>
                        </div>
                        <a href="${c.url}" target="_blank" onclick="event.stopPropagation()" class="w-11 h-11 rounded-2xl bg-red-50 flex items-center justify-center text-red-500 shadow-sm active:scale-90 transition-transform">
                            <i class="fab fa-youtube text-lg"></i>
                        </a>
                    `;
                    grid.appendChild(card);
                });
                tSection.appendChild(grid);
                container.appendChild(tSection);
            });
        }

        function scrollToT(t) {
            const el = document.getElementById(`sec-${t}`);
            if(el) {
                const headerOffset = 100;
                const elementPosition = el.getBoundingClientRect().top;
                const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
                window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
                
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                const btnId = t === '陳詮' ? 'navChen' : 'navLiu';
                const btn = document.getElementById(btnId);
                if(btn) btn.classList.add('active');
            }
        }
    </script>
