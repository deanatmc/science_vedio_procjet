            { source: "全集", cat: "B4C3 酸鹼鹽", title: "3-1 認識電解質", url: "https://youtu.be/S-g81LsVVYU", note: "" },
            { source: "全集", cat: "B4C3 酸鹼鹽", title: "3-2 常見的酸與鹼", url: "https://youtu.be/zYJzqQADEbs", note: "" },
            { source: "全集", cat: "B4C3 酸鹼鹽", title: "3-3 酸鹼濃度", url: "https://youtu.be/IEtEy-Aik6Y", note: "" },
            { source: "全集", cat: "B4C3 酸鹼鹽", title: "3-4 酸鹼中和", url: "https://youtu.be/BaIo94yk1G8", note: "" },
            { source: "全集", cat: "B4C3 酸鹼鹽", title: "歷屆會考考題解析", url: "https://youtu.be/zT5c0Q_rWB0", note: "考題" }
        ];

        function checkPassword() {
            if (document.getElementById('entryPassword').value === ACCESS_PASSWORD) {
                document.getElementById('authOverlay').style.display = 'none';
                document.getElementById('app').classList.remove('hidden');
                initApp();
            } else {
                alert("密碼錯誤");
            }
        }

        async function initApp() {
            setLoading(true);
            try {
                const { data } = await supabaseClient.from('science_tracker').select('data').eq('user_id', userId).maybeSingle();
                if (data) progress = data.data;
                updateStatus("已連線", "bg-green-500");
            } catch (e) {
                updateStatus("連線受阻", "bg-red-400");
            }
            setLoading(false);
            render();
        }

        async function saveProgress() {
            updateStatus("正在儲存...", "bg-amber-400", true);
            await supabaseClient.from('science_tracker').upsert({ user_id: userId, data: progress });
            updateStatus("已連線", "bg-green-500");
        }

        function render() {
            const container = document.getElementById('courseList');
            container.innerHTML = '';
            
            const list = masterData.filter(d => d.source === currentTab);
            const chapters = [...new Set(list.map(d => d.cat))];

            // 更新總進度
            const total = list.length;
            const watched = list.filter(d => progress[d.url]).length;
            const percent = Math.round((watched / total) * 100) || 0;
            
            document.getElementById('totalCount').innerText = total;
            document.getElementById('totalWatched').innerText = watched;
            document.getElementById('totalPercent').innerText = percent;
            document.getElementById('totalBar').style.width = `${percent}%`;

            chapters.forEach(cat => {
                const items = list.filter(d => d.cat === cat);
                const section = document.createElement('div');
                section.innerHTML = `
                    <h3 class="text-lg font-black text-slate-800 mb-3 px-1 border-l-4 border-sky-500 pl-3">${cat}</h3>
                    <div class="space-y-3">
                        ${items.map(item => {
                            const isDone = progress[item.url];
                            return `
                                <div class="glass-card p-4 flex items-center gap-4 ${isDone ? 'completed shadow-none' : 'shadow-sm'}" onclick="toggleDone('${item.url}')">
                                    <input type="checkbox" class="custom-checkbox" ${isDone ? 'checked' : ''}>
                                    <div class="flex-1">
                                        <h4 class="text-[14px] font-bold text-slate-700 leading-tight">${item.title}</h4>
                                        ${item.note ? `<span class="text-[9px] font-black bg-slate-100 text-slate-400 px-1.5 py-0.5 rounded mt-1 inline-block uppercase">${item.note}</span>` : ''}
                                    </div>
                                    <a href="${item.url}" target="_blank" onclick="event.stopPropagation()" class="w-10 h-10 rounded-xl bg-slate-50 flex items-center justify-center text-red-500 hover:bg-red-500 hover:text-white transition-all">
                                        <i class="fab fa-youtube"></i>
                                    </a>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
                container.appendChild(section);
            });
        }

        function toggleDone(url) {
            if (progress[url]) delete progress[url];
            else {
                progress[url] = true;
                confetti({ particleCount: 40, spread: 60, origin: { y: 0.8 } });
            }
            render();
            saveProgress();
        }

        function switchTab(t) {
            currentTab = t;
            document.getElementById('tab-陳詮').className = t === '陳詮' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('tab-全集').className = t === '全集' ? 'tab-btn active' : 'tab-btn';
            render();
        }

        function updateStatus(text, color, pulse = false) {
            document.getElementById('statusText').innerText = text;
            const dot = document.getElementById('statusDot');
            dot.className = `w-2 h-2 rounded-full ${color} ${pulse ? 'animate-pulse' : ''}`;
        }

        function setLoading(s) {
            document.body.style.opacity = s ? '0.6' : '1';
        }
    </script>
</body>
</html>
