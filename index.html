<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>理化雲端導航 | 個人專屬版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: #f1f5f9; color: #1e293b; overflow-x: hidden; }
        .glass-card { background: white; border-radius: 20px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #e2e8f0; }
        .glass-card:active { transform: scale(0.98); }
        .completed { background: #f0fdf4; border-color: #86efac; }
        .completed h3 { color: #15803d; text-decoration: line-through; opacity: 0.7; }
        .custom-checkbox { width: 24px; height: 24px; border-radius: 8px; border: 2.5px solid #cbd5e1; appearance: none; display: flex; align-items: center; justify-content: center; background: white; cursor: pointer; }
        .custom-checkbox:checked { background: #22c55e; border-color: #22c55e; }
        .custom-checkbox:checked::after { content: "\f00c"; font-family: "Font Awesome 6 Free"; font-weight: 900; color: white; font-size: 14px; }
        .tab-btn { position: relative; padding: 10px 4px; font-weight: 700; color: #94a3b8; transition: all 0.3s; }
        .tab-btn.active { color: #0284c7; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: #0284c7; border-radius: 10px; }
        
        #authOverlay { position: fixed; inset: 0; z-index: 1000; background: #f1f5f9; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="pb-10">
    <!-- 密碼鎖定層 -->
    <div id="authOverlay">
        <div class="w-full max-w-sm px-6 text-center">
            <div class="bg-white p-8 rounded-[32px] shadow-2xl shadow-slate-200 border border-white">
                <div class="w-20 h-20 bg-sky-500 text-white rounded-3xl flex items-center justify-center text-3xl mx-auto mb-6 shadow-lg shadow-sky-200">
                    <i class="fas fa-lock"></i>
                </div>
                <h2 class="text-2xl font-black text-slate-800 mb-2">請輸入存取密碼</h2>
                <p class="text-slate-400 text-sm mb-6">這是您的私密學習空間</p>
                <input type="password" id="entryPassword" placeholder="請輸入密碼" autofocus
                       class="w-full px-4 py-4 rounded-2xl bg-slate-100 border-2 border-transparent focus:border-sky-500 focus:bg-white transition-all outline-none text-center text-xl tracking-widest mb-4">
                <button onclick="checkPassword()" id="unlockBtn" 
                        class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold hover:bg-sky-600 active:scale-95 transition-all">
                    解鎖進入
                </button>
                <p id="errorMsg" class="text-red-500 text-sm mt-4 hidden">密碼不正確，請再試一次</p>
            </div>
        </div>
    </div>

    <!-- 主應用程式介面 -->
    <div id="app" class="hidden">
        <header class="sticky top-0 bg-white/80 backdrop-blur-xl border-b z-40 px-6 pt-8 pb-4">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-2xl font-black text-slate-900">理化雲端導航</h1>
                    <div class="flex items-center gap-2 mt-1">
                        <span id="syncStatus" class="flex items-center gap-1.5 text-xs font-bold text-slate-400">
                            <span id="statusDot" class="w-2 h-2 rounded-full bg-slate-300"></span>
                            <span id="statusText">正在連線...</span>
                        </span>
                    </div>
                </div>
                <div class="text-right">
                    <span class="text-[10px] font-black text-slate-300 tracking-widest">PRIVATE LOCK</span>
                </div>
            </div>
            
            <div class="flex gap-8">
                <button onclick="switchTab('陳詮')" id="tab-陳詮" class="tab-btn active">陳詮老師</button>
                <button onclick="switchTab('劉川楓')" id="tab-劉川楓" class="tab-btn">劉川楓老師</button>
            </div>
        </header>

        <main class="p-6 space-y-4" id="courseList">
            <!-- 載入中動畫 -->
            <div class="py-20 text-center text-slate-300">
                <i class="fas fa-circle-notch animate-spin text-3xl mb-4"></i>
                <p class="text-sm font-bold">正在讀取進度...</p>
            </div>
        </main>
    </div>

    <script>
        const ACCESS_PASSWORD = "study"; 
        const SB_URL = 'https://piovrdifroesqwozwtnm.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpb3ZyZGlmcm9lc3F3b3p3dG5tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1OTE3NTgsImV4cCI6MjA5MjE2Nzc1OH0.7lmWsr8gd99rNXoZNdSuoVffiny-Z5Zt7jEhZPRXGf8';
        
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        const myId = 'MyPrivateRoom_001'; 
        let currentTeacher = '陳詮';
        let progress = {};

        const courseData = [
            { teacher: "陳詮", cat: "B4-C1", title: "化學反應的特徵 (含例題)", url: "https://youtu.be/toMOr4DSKA" },
            { teacher: "陳詮", cat: "B4-C1", title: "質量守恆定律", url: "https://youtu.be/QjzEYB8QIPM" },
            { teacher: "陳詮", cat: "B4-C1", title: "化學反應表示法及係數平衡", url: "https://youtu.be/98xtXVtJzKM" },
            { teacher: "陳詮", cat: "B4-C1", title: "原子量與莫耳數", url: "https://youtu.be/DbERFgkt7X4" },
            { teacher: "陳詮", cat: "B4-C2", title: "元素的燃燒與活性", url: "https://youtu.be/SobXMJ7UofU" },
            { teacher: "陳詮", cat: "B4-C2", title: "氧化還原觀念大集合", url: "https://youtu.be/taV_wdGLZ90" },
            { teacher: "陳詮", cat: "B4-C3", title: "電解質觀念", url: "https://youtu.be/rdEXI1sTZOA" },
            { teacher: "陳詮", cat: "B4-C3", title: "酸鹼鹽觀念大集合", url: "https://youtu.be/Gpq_CTIMegE" },
            { teacher: "陳詮", cat: "B4-C4", title: "有機化合物定義與檢測", url: "https://youtu.be/Z9piArlF2vk" },
            { teacher: "陳詮", cat: "B4-C5", title: "有機聚合物", url: "https://youtu.be/RB2R-panIUo" },
            { teacher: "陳詮", cat: "B4-C6", title: "力的基本性質", url: "https://youtu.be/PTXijsBihNg" },
            { teacher: "陳詮", cat: "B4-C6", title: "大氣壓力觀念", url: "https://youtu.be/EEkbL8QZhdc" },
            { teacher: "陳詮", cat: "B4-C6", title: "浮體與沉體關係式", url: "https://youtu.be/FV33NgTMpcE" },
            { teacher: "劉川楓", cat: "B3-C1", title: "1-1 實驗安全與設計", url: "https://youtu.be/kQn2Nm0hrCM" },
            { teacher: "劉川楓", cat: "B3-C1", title: "1-2 長度與體積的測量", url: "https://youtu.be/8_2rn5JM3g4" },
            { teacher: "劉川楓", cat: "B3-C1", title: "1-4 物質的密度", url: "https://youtu.be/4IX46s7JFk1" },
            { teacher: "劉川楓", cat: "B3-C2", title: "2-2 水溶液及濃度", url: "https://youtu.be/CKNPX091-91" },
            { teacher: "劉川楓", cat: "B3-C3", title: "3-1 波的傳播", url: "https://youtu.be/JAxyGBJsLgk" },
            { teacher: "劉川楓", cat: "B3-C4", title: "4-1 光的直進", url: "https://youtu.be/jvIys5anwVE" },
            { teacher: "劉川楓", cat: "B3-C5", title: "5-2 熱量與比熱", url: "https://youtu.be/Nb9n2PExZQk" },
            { teacher: "劉川楓", cat: "B3-C6", title: "6-6 物質變化的粒子觀點", url: "https://youtu.be/1lkLfobZxS8" },
            { teacher: "劉川楓", cat: "B4-C1", title: "1-2 原子量與莫耳數", url: "https://youtu.be/JmRan81w-Jg" },
            { teacher: "劉川楓", cat: "B4-C2", title: "2-2 氧化還原與其應用", url: "https://youtu.be/6DHT4mo3L88" },
            { teacher: "劉川楓", cat: "B4-C6", title: "6-6 水的浮力", url: "https://youtu.be/hYVHIuiphG4" }
        ];

        function checkPassword() {
            const inputField = document.getElementById('entryPassword');
            const unlockBtn = document.getElementById('unlockBtn');
            const input = inputField.value.trim();

            if (input === ACCESS_PASSWORD) {
                unlockBtn.innerText = "驗證成功...";
                unlockBtn.classList.replace('bg-slate-900', 'bg-green-500');
                
                // 強制切換顯示
                document.getElementById('authOverlay').style.display = 'none';
                document.getElementById('app').classList.remove('hidden');
                
                initApp();
            } else {
                const error = document.getElementById('errorMsg');
                error.classList.remove('hidden');
                inputField.value = "";
                inputField.focus();
                setTimeout(() => error.classList.add('hidden'), 2000);
            }
        }

        document.getElementById('entryPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });

        async function initApp() {
            updateStatus("正在讀取進度...", "bg-amber-400", true);
            try {
                const { data, error } = await supabaseClient
                    .from('science_tracker')
                    .select('data')
                    .eq('user_id', myId)
                    .maybeSingle();
                
                if (data && data.data) {
                    progress = data.data;
                    updateStatus("進度已同步", "bg-green-500");
                } else {
                    updateStatus("歡迎開始學習", "bg-sky-500");
                }
            } catch (e) {
                updateStatus("離線模式", "bg-slate-400");
            }
            render();
        }

        async function saveToCloud() {
            updateStatus("儲存中...", "bg-sky-400", true);
            const { error } = await supabaseClient
                .from('science_tracker')
                .upsert({ user_id: myId, data: progress }, { onConflict: 'user_id' });

            if (error) {
                updateStatus("儲存失敗", "bg-red-500");
            } else {
                updateStatus("已安全存檔", "bg-green-500");
            }
        }

        function updateStatus(text, color, pulse = false) {
            document.getElementById('statusText').innerText = text;
            const dot = document.getElementById('statusDot');
            dot.className = `w-2 h-2 rounded-full ${color} ${pulse ? 'animate-pulse' : ''}`;
        }

        function render() {
            const container = document.getElementById('courseList');
            container.innerHTML = '';
            
            const list = courseData.filter(c => c.teacher === currentTeacher);
            
            list.forEach(item => {
                const isDone = progress[item.url] === true;
                const card = document.createElement('div');
                card.className = `glass-card p-5 flex items-center gap-5 ${isDone ? 'completed shadow-none' : 'shadow-md shadow-slate-200/50'}`;
                
                card.innerHTML = `
                    <div class="flex-shrink-0">
                        <input type="checkbox" class="custom-checkbox" ${isDone ? 'checked' : ''}>
                    </div>
                    <div class="flex-1 min-w-0">
                        <span class="text-[10px] font-black text-slate-400 tracking-widest uppercase">${item.cat}</span>
                        <h3 class="text-base font-bold text-slate-800 leading-tight truncate mt-0.5">${item.title}</h3>
                    </div>
                    <a href="${item.url}" target="_blank" onclick="event.stopPropagation()" class="flex-shrink-0 w-12 h-12 rounded-2xl bg-red-50 text-red-500 flex items-center justify-center hover:bg-red-500 hover:text-white transition-all">
                        <i class="fab fa-youtube text-xl"></i>
                    </a>
                `;

                card.onclick = () => {
                    if (progress[item.url]) {
                        delete progress[item.url];
                    } else {
                        progress[item.url] = true;
                        confetti({ particleCount: 30, spread: 60, origin: { y: 0.8 }, colors: ['#22c55e', '#3b82f6'] });
                    }
                    render();
                    saveToCloud();
                };

                container.appendChild(card);
            });
        }

        function switchTab(t) {
            currentTeacher = t;
            document.getElementById('tab-陳詮').classList.toggle('active', t === '陳詮');
            document.getElementById('tab-劉川楓').classList.toggle('active', t === '劉川楓');
            render();
        }
    </script>
</body>
</html>
