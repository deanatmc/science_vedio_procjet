<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>理化雲端導航 | Firestore 即時同步版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 初始化
        const firebaseConfig = JSON.parse(__firebase_config);
        const windowAppId = typeof __app_id !== 'undefined' ? __app_id : 'science-nav-v3';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 用戶識別碼
        let userId = localStorage.getItem('sci_user_id') || `USER-${Math.floor(Math.random()*9000)+1000}`;
        localStorage.setItem('sci_user_id', userId);
        
        window.progress = JSON.parse(localStorage.getItem('sci_progress_v2') || '{}');

        // 認證邏輯 (遵循 RULE 3)
        async function startApp() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth failed:", error);
            }

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    document.getElementById('userBadge').innerText = userId;
                    setupSync(user.uid);
                }
            });
        }

        // 同步邏輯 (修正路徑段落問題 - RULE 1)
        function setupSync(authUid) {
            if (!auth.currentUser) return;

            // 修正後的路徑: artifacts (coll) -> appId (doc) -> public (coll) -> data (doc) -> users (coll) -> userId (doc)
            // 這樣總共有 6 個段落 (偶數)，符合 Firestore 規範
            const docRef = doc(db, 'artifacts', windowAppId, 'public', 'data', 'users', userId);

            // 監聽雲端變動
            const unsubscribe = onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    const cloudData = docSnap.data().progress || {};
                    window.progress = cloudData;
                    localStorage.setItem('sci_progress_v2', JSON.stringify(window.progress));
                    window.render();
                    window.showSyncStatus("雲端已同步", "bg-green-500");
                }
            }, (error) => {
                console.error("Sync Error:", error);
                window.showSyncStatus("同步連線中", "bg-amber-500");
            });

            // 暴露更新函數
            window.saveToCloud = async (newData) => {
                if (!auth.currentUser) return;
                window.showSyncStatus("正在同步...", "bg-sky-400", true);
                try {
                    await setDoc(docRef, { 
                        progress: newData, 
                        updatedAt: Date.now(),
                        lastAuthUid: authUid 
                    }, { merge: true });
                    window.showSyncStatus("同步成功", "bg-green-500");
                } catch (e) {
                    console.error("Save Error:", e);
                    window.showSyncStatus("同步失敗", "bg-red-500");
                }
            };
        }

        window.checkPw = () => {
            const pw = document.getElementById('pwInput').value.trim();
            if(pw === "study") {
                document.getElementById('authGuard').style.display = 'none';
                document.getElementById('app').classList.remove('hidden');
                startApp();
                window.render();
            } else {
                const btn = document.getElementById('loginBtn');
                btn.innerText = "密碼錯誤！";
                btn.classList.add('bg-red-500');
                setTimeout(() => { 
                    btn.innerText = "進入導航系統"; 
                    btn.classList.remove('bg-red-500'); 
                }, 2000);
            }
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: #f8fafc; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; }
        .video-card { transition: all 0.2s ease; cursor: pointer; border-radius: 20px; }
        .video-card:active { transform: scale(0.97); }
        .completed { background: #f0fdf4 !important; border-color: #bbf7d0 !important; }
        .completed .title-text { color: #166534; text-decoration: line-through; opacity: 0.6; }
        .custom-checkbox { width: 22px; height: 22px; border-radius: 7px; border: 2px solid #cbd5e1; appearance: none; display: flex; align-items: center; justify-content: center; background: white; transition: 0.2s; flex-shrink: 0; }
        .custom-checkbox:checked { background: #22c55e; border-color: #22c55e; }
        .custom-checkbox:checked::after { content: "\f00c"; font-family: "Font Awesome 6 Free"; font-weight: 900; color: white; font-size: 11px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #f1f5f9; display: flex; justify-content: space-around; padding: 12px 0 calc(12px + env(safe-area-inset-bottom)); z-index: 50; }
        .nav-btn { display: flex; flex-direction: column; align-items: center; font-size: 11px; color: #94a3b8; font-weight: bold; cursor: pointer; }
        .nav-btn.active { color: #0284c7; }
        @keyframes pulse-sync { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .syncing { animation: pulse-sync 1s infinite; }
    </style>
</head>
<body class="pb-28">
    <!-- 驗證牆 -->
    <div id="authGuard" class="fixed inset-0 z-[100] bg-slate-50 flex items-center justify-center px-6">
        <div class="w-full max-w-sm glass-card p-10 rounded-[40px] shadow-2xl text-center border-none">
            <div class="w-20 h-20 bg-sky-600 text-white rounded-3xl flex items-center justify-center text-3xl mx-auto mb-8 shadow-xl shadow-sky-200">
                <i class="fas fa-bolt"></i>
            </div>
            <h2 class="text-2xl font-black mb-2">即時同步啟動</h2>
            <p class="text-slate-400 text-sm mb-8">請輸入課程密碼進入</p>
            <input type="password" id="pwInput" placeholder="••••••••" class="w-full p-5 rounded-2xl bg-slate-100 border-none text-center text-2xl tracking-[0.3em] mb-6 outline-sky-500">
            <button id="loginBtn" onclick="checkPw()" class="w-full py-5 bg-sky-600 text-white rounded-2xl font-black text-lg shadow-xl shadow-sky-100 active:scale-95 transition-all">進入導航系統</button>
        </div>
    </div>

    <div id="app" class="hidden">
        <header class="sticky top-0 bg-white/90 backdrop-blur-lg border-b px-6 py-5 flex justify-between items-center z-40">
            <div>
                <h1 class="text-xl font-black text-slate-800 tracking-tight">理化雲端導航</h1>
                <div class="flex items-center gap-2 mt-1">
                    <span id="syncIndicator" class="w-2 h-2 rounded-full bg-slate-300"></span>
                    <span id="syncText" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">連線中</span>
                </div>
            </div>
            <div id="userBadge" class="px-4 py-1.5 bg-slate-100 rounded-full text-[10px] font-black text-slate-500 border border-slate-200 uppercase">STUDENT</div>
        </header>

        <main class="p-6">
            <div class="mb-8">
                <div class="relative">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                    <input type="text" id="searchInput" oninput="window.render()" placeholder="搜尋關鍵字 (例如: 莫耳, 浮力, 壓力)..." class="w-full pl-12 pr-4 py-4 rounded-2xl bg-white border border-slate-200 outline-sky-500 shadow-sm font-medium">
                </div>
            </div>
            <div id="contentList" class="space-y-12"></div>
        </main>

        <nav class="bottom-nav">
            <div onclick="window.scrollToT('陳詮')" class="nav-btn active" id="navChen"><i class="fas fa-graduation-cap text-lg mb-1"></i><span>陳詮專區</span></div>
            <div onclick="window.scrollToT('劉川楓')" class="nav-btn" id="navLiu"><i class="fas fa-flask text-lg mb-1"></i><span>劉川楓專區</span></div>
            <div onclick="window.scrollTo({top:0, behavior:'smooth'})" class="nav-btn"><i class="fas fa-chevron-up text-lg mb-1"></i><span>回頂部</span></div>
        </nav>
    </div>

    <script>
        // 影片資料清單
        const courses = [
            { teacher: "劉川楓", cat: "B3-C1", type: "觀念", title: "1-1 實驗安全與設計", url: "https://youtu.be/kQn2Nm0hrCM" },
            { teacher: "劉川楓", cat: "B3-C1", type: "觀念", title: "1-2 長度與體積的測量", url: "https://youtu.be/8_2rn5JM3g4" },
            { teacher: "劉川楓", cat: "B3-C4", type: "觀念", title: "4-1 光的直進", url: "https://youtu.be/jvIys5anwVE" },
            { teacher: "劉川楓", cat: "B4-C6", type: "觀念", title: "6-6 水的浮力", url: "https://youtu.be/hYVHIuiphG4" },
            { teacher: "陳詮", cat: "B4-C1", type: "觀念", title: "化學反應的特徵", url: "https://youtu.be/toMOr4DSKA" },
            { teacher: "陳詮", cat: "B4-C3", type: "觀念", title: "酸鹼觀念大集合", url: "https://youtu.be/Gpq_CTIMegE" },
            { teacher: "陳詮", cat: "B4-C6", type: "觀念", title: "大氣壓力觀念", url: "https://youtu.be/EEkbL8QZhdc" },
            { teacher: "陳詮", cat: "B4-C6", type: "觀念", title: "浮體與沉體關係式", url: "https://youtu.be/FV33NgTMpcE" }
        ];

        window.toggleDone = async (url) => {
            if (window.progress[url]) delete window.progress[url];
            else {
                window.progress[url] = true;
                confetti({ particleCount: 20, spread: 40, origin: { y: 0.9 }, colors: ['#0284c7'] });
            }
            
            window.render();
            if (window.saveToCloud) {
                await window.saveToCloud(window.progress);
            }
        };

        window.showSyncStatus = (text, colorClass, isSyncing = false) => {
            const ind = document.getElementById('syncIndicator');
            const txt = document.getElementById('syncText');
            if (ind && txt) {
                ind.className = `w-2 h-2 rounded-full ${colorClass} ${isSyncing ? 'syncing' : ''}`;
                txt.innerText = text;
            }
        };

        window.render = () => {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const container = document.getElementById('contentList');
            if (!container) return;
            container.innerHTML = "";

            ["陳詮", "劉川楓"].forEach(t => {
                const filtered = courses.filter(c => 
                    c.teacher === t && 
                    (c.title.toLowerCase().includes(query) || c.cat.toLowerCase().includes(query))
                );
                
                if(filtered.length === 0 && query !== "") return;

                const tSection = document.createElement('div');
                tSection.id = `sec-${t}`;
                tSection.innerHTML = `
                    <div class="flex justify-between items-center mb-5">
                        <h2 class="text-2xl font-black flex items-center gap-3">
                            <span class="w-1.5 h-8 ${t === '陳詮' ? 'bg-sky-500' : 'bg-amber-500'} rounded-full"></span>
                            ${t} 老師
                        </h2>
                    </div>
                    <div class="grid grid-cols-1 gap-4"></div>
                `;
                
                const grid = tSection.querySelector('div.grid');
                filtered.forEach(c => {
                    const isDone = window.progress[c.url];
                    const card = document.createElement('div');
                    card.className = `video-card glass-card p-5 flex items-center gap-4 ${isDone ? 'completed shadow-none border-green-100' : 'shadow-sm'}`;
                    card.onclick = () => window.toggleDone(c.url);
                    card.innerHTML = `
                        <input type="checkbox" class="custom-checkbox" ${isDone ? 'checked' : ''} onclick="event.stopPropagation(); window.toggleDone('${c.url}')">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-[9px] font-black uppercase px-2 py-0.5 rounded-md ${isDone ? 'bg-green-100 text-green-600' : 'bg-slate-100 text-slate-400'}">${c.cat}</span>
                            </div>
                            <h3 class="title-text font-bold text-slate-700 text-sm truncate">${c.title}</h3>
                        </div>
                        <a href="${c.url}" target="_blank" onclick="event.stopPropagation()" class="w-10 h-10 rounded-xl bg-red-50 flex items-center justify-center text-red-500">
                            <i class="fab fa-youtube text-lg"></i>
                        </a>
                    `;
                    grid.appendChild(card);
                });
                container.appendChild(tSection);
            });
        };

        window.scrollToT = (t) => {
            const el = document.getElementById(`sec-${t}`);
            if(el) {
                window.scrollTo({ top: el.offsetTop - 100, behavior: 'smooth' });
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                const btn = document.getElementById(t === '陳詮' ? 'navChen' : 'navLiu');
                if (btn) btn.classList.add('active');
            }
        };
    </script>
</body>
</html>
